<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Array Example</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <h1 style="text-align: center;">Array Page Example</h1>
</head>

<body>
    <script type="text/javascript">
        var stdInfo = [1000, 'Sahasra', 78.9];
        for (let i = 0; i < stdInfo.length; i++) {
            if (i == 0) {
                console.log("Student Rollno : " + stdInfo[i]);
            }
            if (i == 1) {
                console.log("Student Name : " + stdInfo[i]);
            }
            if (i == 2) {
                console.log("Student Percentage : " + stdInfo[i]);
            }
        }
        var x = [10, 45, 89, 200, 500];
        //this method allows to add value after the last index in an array
        x.push(1000);
        console.log(x);
        //this method allows to delete element from an array it takes index and number of elements to be deleted from an array
        x.splice(2,2);
        console.log(x);
    </script>
</body>

</html>
